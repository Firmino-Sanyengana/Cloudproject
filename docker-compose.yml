services:
  backend:
    build: ./backend
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=file:/app/prisma/data/dev.db
    volumes:
      - sqlitedata:/app/prisma/data  # Este volume persiste o .seed_executed também
      - /app/node_modules
    networks:
      - app-net

  frontend:
    build: ./frontend
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "4001:4001"
    depends_on:
      - backend
    networks:
      - app-net

volumes:
  sqlitedata:

networks:
  app-net: